version: "3.8"

services:

  vllm:
    image: ghcr.io/sasha0552/vllm:latest
    container_name: vllm

    runtime: nvidia

    ports:
      - "8000:8000"

    volumes:
      - ./models:/models

    environment:
      - CUDA_VISIBLE_DEVICES=0

    command: >
      --model /models/Qwen/Qwen3-4B-GPTQ-Int4
      --served-model-name qwen3-4b
      --host 0.0.0.0
      --port 8000
      --dtype float16
      --quantization gptq
      --reasoning-parser deepseek_r1
      --max-model-len 32768
      --max-num-seqs 4
      --gpu-memory-utilization 0.95
      --disable-custom-all-reduce
      --enable-auto-tool-choice
      --tool-call-parser hermes


    shm_size: 16g
    ipc: host
    restart: unless-stopped